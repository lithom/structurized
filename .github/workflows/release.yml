name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check required secrets
        shell: bash
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY_BASE64: ${{ secrets.GPG_PRIVATE_KEY_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          missing=0
          for secret_name in CENTRAL_USERNAME CENTRAL_PASSWORD GPG_PRIVATE_KEY_BASE64 GPG_PASSPHRASE; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY_BASE64: ${{ secrets.GPG_PRIVATE_KEY_BASE64 }}
        run: |
          mkdir -p "${HOME}/.gnupg"
          chmod 700 "${HOME}/.gnupg"
          printf 'allow-loopback-pinentry\n' > "${HOME}/.gnupg/gpg-agent.conf"
          printf 'pinentry-mode loopback\n' > "${HOME}/.gnupg/gpg.conf"
          printf '%s' "${GPG_PRIVATE_KEY_BASE64}" | base64 --decode > "${RUNNER_TEMP}/maven-signing.key"
          gpg --batch --import "${RUNNER_TEMP}/maven-signing.key"
          rm -f "${RUNNER_TEMP}/maven-signing.key"
          gpgconf --kill gpg-agent || true

      - name: Publish to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -ntp deploy
